name: Deploy Packages

on:
  push:
    tags:
      - '*'

jobs:
  deploy-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Required for OIDC
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - uses: pnpm/action-setup@v2
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - uses: gittools/actions/gitversion/setup@v0
        with:
          versionSpec: '5.x'

      - name: Install Dependencies
        run: pnpm install

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Copy README
        run: cp ./README.md packages/start/README.md

      - name: Gitversion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0

      - name: Set Version
        run: node -e "const fs = require('node:fs'); const file = 'packages/start/package.json'; const pkg = JSON.parse(fs.readFileSync(file, 'utf8')); pkg.version = '${{ steps.gitversion.outputs.fullSemVer }}'; fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Deploy Start Package
        working-directory: ./packages/start
        run: pnpm publish --access public --no-git-checks --tag latest
